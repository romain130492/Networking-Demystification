<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Site</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 30px;
      }

      button {
        padding: 10px 20px;
        border: 1px solid #111;
        background: transparent;
        cursor: pointer;
        font-size: 1rem;
      }

      button:hover {
        background: #111;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <h1>Hello.</h1>
    <p>This is a simple one-page website.</p>
    <button onclick="alert('It works.')">Click Me</button>
  </body>
</html>
