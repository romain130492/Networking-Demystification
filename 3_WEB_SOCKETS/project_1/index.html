
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Client WebSocket</title>
</head>
<body>
<ul id="res">
</ul>
<input type="input" id="message"></input>
<button id="btn_envoi" disabled="true" onclick="envoyer()">Envoyer
</button><br>
<button id="btn_connexion" onclick="connexion()">Connect</button>
<button id="btn_cloture" disabled="true" onclick="cloture()">Close
</button><script>
/* Client Javascript */

function connexion(){
  document.getElementById("btn_envoi").disabled = false;
  document.getElementById("btn_cloture").disabled = false;
  document.getElementById("btn_connexion").disabled = true;
  ws = new WebSocket('ws://'+location.host+'/');
  ws.onopen = function() {
    console.log('WebSocket Client Connected');
    ws.send('Hi this is web client.');
    //ws.send("A".repeat(5_000_000));
    };
  ws.onmessage = function(e) {
    console.log("Received: '" + e.data + "'");
    let li = document.createElement("li");
    li.innerText = e.data;
    document.getElementById("messages").appendChild(li);
    };
  ws.onerror = function(){
    console.log("Error => cloture");
    cloture();
    }
  }

  function cloture(){
    document.getElementById("btn_envoi").disabled = true;
    document.getElementById("btn_cloture").disabled = true;
    document.getElementById("btn_connexion").disabled = false;
    ws.close();
    ws = undefined;
  };

function envoyer(){
  if(ws){
    console.log('Sending message:', document.getElementById("message").value);
    ws.send(document.getElementById("message").value);
    }
  };


</script>
</html>
